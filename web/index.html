<!DOCTYPE html>
<html>
<head>
  <!--

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smart_class_checkin_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>smart_class_checkin_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Always clear old service worker caches so normal reload gets latest deploy.
    (async function () {
      const onceParam = 'cacheResetDone';
      try {
        let hadOldCache = false;

        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          if (registrations.length > 0) {
            hadOldCache = true;
          }
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const cacheKeys = await caches.keys();
          if (cacheKeys.length > 0) {
            hadOldCache = true;
          }
          await Promise.all(cacheKeys.map((key) => caches.delete(key)));
        }

        const params = new URLSearchParams(window.location.search);
        const alreadyReloaded = params.get(onceParam) === '1';
        if (hadOldCache && !alreadyReloaded) {
          params.set(onceParam, '1');
          const nextSearch = params.toString();
          const nextUrl = window.location.pathname + (nextSearch.length === 0 ? '' : '?' + nextSearch);
          window.location.replace(nextUrl + window.location.hash);
          return;
        }

        if (alreadyReloaded) {
          params.delete(onceParam);
          const cleanSearch = params.toString();
          const cleanUrl = window.location.pathname + (cleanSearch.length === 0 ? '' : '?' + cleanSearch) + window.location.hash;
          window.history.replaceState({}, '', cleanUrl);
        }
      } catch (_) {
        // If cache reset is not available, proceed with normal app boot.
      }
    })();
  </script>

  <!--

    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
